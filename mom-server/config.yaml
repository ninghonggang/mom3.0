server:
  port: 9081
  mode: debug
  env: development  # development | production（生产环境设为 production，迁移失败会退出）
  jwt:
    secret: "mom3-secret-key-change-in-production"
    access_token_expire: 7200s    # 2小时
    refresh_token_expire: 604800s # 7天

database:
  host: "localhost"
  port: 5432
  user: "momadmin"
  password: "mom123456"
  dbname: "mom3_db"
  sslmode: "disable"

redis:
  # host: "localhost"
  # port: 6379
  # Redis已禁用（代码中未实际使用）
  password: ""
  db: 0

minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket: "mom3-files"

log:
  level: "debug"
  format: "json"
  output: "stdout"

websocket:
  ping_interval: 30
  max_msg_size: 1024

asynq:
  concurrency: 10
  redis_url: "redis://localhost:6379"
